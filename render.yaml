services:
  - type: worker
    name: amul-stock-monitor
    runtime: python
    buildCommand: pip install -r requirements.txt && playwright install chromium && playwright install-deps chromium
    startCommand: python main.py
    envVars:
      - key: EMAIL_SENDER
        sync: false
      - key: EMAIL_RECEIVER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
